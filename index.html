<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Capstone Group - TTU</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Senior Capstone Group</h1>
            <ul class="nav-links">
                <li><a href="#members">Members</a></li>
                <li><a href="#meetings">Meetings & Activities</a></li>
                <li><a href="#schedule">Schedule</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <!-- Members Section -->
        <section id="members" class="section">
            <h2>Group Members & Roles</h2>
            <div class="members-grid" id="membersContainer">
                <!-- Populated by JavaScript -->
            </div>
        </section>

        <!-- Meetings & Activities Section -->
        <section id="meetings" class="section">
            <h2>Meetings & Activities</h2>
            <div class="activities-list" id="activitiesContainer">
                <!-- Populated by JavaScript -->
            </div>
        </section>

        <!-- Upcoming Schedule Section -->
        <section id="schedule" class="section">
            <h2>Upcoming Schedule</h2>
            <div class="schedule-container" id="scheduleContainer">
                <!-- Populated by JavaScript -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Senior Capstone Group - Texas Tech University</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
